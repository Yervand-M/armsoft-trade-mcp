services:
  armsoft-mcp:
    build: .
    container_name: armsoft-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ARMSOFT_API_KEY=${ARMSOFT_API_KEY}
      - ARMSOFT_LANGUAGE=${ARMSOFT_LANGUAGE:-en-US}
      - ARMSOFT_BASE_URL=${ARMSOFT_BASE_URL:-https://api.armsoft.am/trade/v1}